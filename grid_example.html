<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .grid
        {
            display:grid;
            grid-template-columns:50px 50px 50px 50px 50px;
            grid-template-rows:50px 50px 50px 50px; 
            gap:5px; 
            text-align:center;
        }
        #header
        {
            grid-column-start:1;
            grid-column-end:6;  
        }
        #container1
        {
            grid-column-start:2;
            grid-column-end:6;
              
        }
        #container2
        {
            grid-column-start:2;
            grid-column-end:4;
             
        }
        #container3
        {
            grid-column-start:4;
            grid-column-end:6;
        }
        #footer
        {
            grid-column-start:1;
            grid-column-end:6;
        
        }
        #sidebar
        {
            grid-row-start:2;
            grid-row-end:4;
             
        }
        .grid .box
        {
            background-color:yellow;
            border:1px solid black;
        }

    </style>
</head>
<body>
    <h1>CSS Grid</h1>
    <div class="grid">
        <div class="box" id="header">Header</div>
        <div class="box" id="container1">container 1</div>
        <div class="box" id="sidebar">side bar</div>
        <div class="box" id="container2">container 2</div>
        <div class="box" id="container3">container 3</div>
        <div class="box" id="footer">footer</div>
    </div>
</body>
</html>
